<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Mahalaxmi Mobile Center</title>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <link rel="apple-touch-icon" href="../assets/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="../assets/logo.png" alt="Mahalaxmi Mobile Center">
      <span>Mahalaxmi Mobile Center</span>
    </div>
    <p class="login-subtitle">Admin Panel</p>
    <div class="login-error" id="loginError">Invalid email or password</div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="admin@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign in</button>
    </form>
  </div>
  <script src="../sheets-api.js"></script>
  <script src="js/admin-app.js"></script>
</body>
</html>
